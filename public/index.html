<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gals in Jers/London 💘🧚💌</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌴</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #ffffff;
  color: #37352f;
  line-height: 1.5;
  padding: 24px;
  max-width: 1100px;
  margin: 0 auto;
}

h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 4px; }
.subtitle { color: #9b9a97; font-size: 0.9rem; margin-bottom: 24px; }

/* ---- Input bar ---- */
.input-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-bottom: 24px;
  padding: 16px;
  border: 1px solid #e9e9e7;
  border-radius: 8px;
  background: #fbfbfa;
}
.input-bar input[type="text"] {
  font-family: inherit;
  font-size: 0.9rem;
  padding: 8px 12px;
  border: 1px solid #e9e9e7;
  border-radius: 6px;
  background: #fff;
  outline: none;
  width: 180px;
}
.input-bar input[type="text"]:focus { border-color: #c4c4c2; }

.loc-btns { display: flex; gap: 6px; }
.loc-btn {
  font-family: inherit;
  font-size: 0.85rem;
  padding: 7px 14px;
  border: 1px solid #e9e9e7;
  border-radius: 6px;
  background: #fff;
  cursor: pointer;
  transition: all 0.15s;
  color: #37352f;
}
.loc-btn:hover { background: #f7f6f3; }
.loc-btn.active-jersey { background: #dbeddb; border-color: #b8d9b8; color: #2e5a3a; }
.loc-btn.active-london { background: #e8deee; border-color: #d3c4e3; color: #6940a5; }

.action-btn {
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 500;
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-select {
  background: #37352f;
  color: #fff;
}
.btn-select:hover { background: #555; }
.btn-select:disabled { background: #c4c4c2; cursor: default; }
.btn-done {
  background: #2ecc71;
  color: #fff;
  display: none;
}
.btn-done:hover { background: #27ae60; }
.btn-cancel {
  background: #fff;
  color: #9b9a97;
  border: 1px solid #e9e9e7;
  display: none;
}
.btn-cancel:hover { background: #f7f6f3; color: #37352f; }

.selecting-hint {
  display: none;
  font-size: 0.82rem;
  color: #9b9a97;
  width: 100%;
  margin-top: 4px;
}

/* ---- Calendar ---- */
.cal-header {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  margin-bottom: 1px;
}
.cal-header div {
  text-align: center;
  font-size: 0.78rem;
  font-weight: 600;
  color: #9b9a97;
  text-transform: uppercase;
  padding: 8px 0;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
  background: #e9e9e7;
  border: 1px solid #e9e9e7;
  border-radius: 8px;
  overflow: hidden;
}
.day-cell {
  background: #fff;
  min-height: 100px;
  padding: 6px;
  position: relative;
  transition: background 0.1s;
}
.day-cell.empty { background: #fbfbfa; }
.day-cell .day-num {
  font-size: 0.8rem;
  font-weight: 500;
  color: #9b9a97;
  margin-bottom: 4px;
}
.day-cell.today .day-num {
  background: #37352f;
  color: #fff;
  width: 22px; height: 22px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%;
}
.day-cell.weekend { background: #fafaf9; }

/* Selecting mode */
body.selecting .day-cell:not(.empty) { cursor: pointer; }
body.selecting .day-cell:not(.empty):hover { background: #f0f0ee; }
.day-cell.selected-day { background: #edf8ee !important; }

/* Selecting banner */
.select-banner {
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  margin-bottom: 16px;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 500;
  gap: 12px;
  flex-wrap: wrap;
}
.select-banner.show { display: flex; }
.select-banner.jersey-mode {
  background: #edf5ed;
  border: 1px solid #b8d9b8;
  color: #2e5a3a;
}
.select-banner.london-mode {
  background: #f3edf8;
  border: 1px solid #d3c4e3;
  color: #6940a5;
}
.select-banner .banner-text { flex: 1; }
.select-banner .banner-actions { display: flex; gap: 8px; }
.banner-done-btn {
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 600;
  padding: 8px 20px;
  border: none;
  border-radius: 6px;
  background: #37352f;
  color: #fff;
  cursor: pointer;
  transition: all 0.15s;
}
.banner-done-btn:hover { background: #555; }
.banner-switch-btn {
  font-family: inherit;
  font-size: 0.85rem;
  font-weight: 500;
  padding: 8px 16px;
  border: 1px solid currentColor;
  border-radius: 6px;
  background: rgba(255,255,255,0.6);
  color: inherit;
  cursor: pointer;
  transition: all 0.15s;
}
.banner-switch-btn:hover { background: rgba(255,255,255,0.9); }
.banner-cancel-btn {
  font-family: inherit;
  font-size: 0.85rem;
  padding: 8px 14px;
  border: 1px solid #e9e9e7;
  border-radius: 6px;
  background: #fff;
  color: #9b9a97;
  cursor: pointer;
}
.banner-cancel-btn:hover { color: #37352f; }
.day-count {
  font-size: 0.78rem;
  opacity: 0.7;
  margin-left: 4px;
}

/* Tags — colour by location */
.tags { display: flex; flex-wrap: wrap; gap: 3px; }
.tag {
  font-size: 0.7rem;
  font-weight: 500;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  line-height: 1.4;
}

.tag-jersey { background: #dbeddb; color: #2e5a3a; }
.tag-london { background: #e8deee; color: #6940a5; }

/* ---- People section ---- */
.people-section {
  margin-top: 32px;
  padding: 20px;
  border: 1px solid #e9e9e7;
  border-radius: 8px;
  background: #fbfbfa;
}
.people-section h2 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 12px;
  color: #37352f;
}
.person-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-radius: 6px;
  margin-bottom: 4px;
  background: #fff;
  border: 1px solid #e9e9e7;
}
.person-info { display: flex; align-items: center; gap: 10px; }
.person-name { font-weight: 500; font-size: 0.9rem; }
.person-meta { font-size: 0.8rem; color: #9b9a97; }
.edit-btn {
  font-family: inherit;
  font-size: 0.78rem;
  padding: 4px 10px;
  border: 1px solid #e9e9e7;
  border-radius: 5px;
  background: #fff;
  color: #9b9a97;
  cursor: pointer;
  transition: all 0.15s;
}
.edit-btn:hover { background: #f7f6f3; color: #37352f; border-color: #c4c4c2; }

.no-people { color: #9b9a97; font-size: 0.85rem; font-style: italic; }

/* Month label */
.month-label {
  font-size: 1rem;
  font-weight: 600;
  margin: 20px 0 8px;
  color: #37352f;
}

/* Responsive */
@media (max-width: 700px) {
  body { padding: 12px; }
  .day-cell { min-height: 70px; padding: 4px; }
  .day-cell .day-num { font-size: 0.72rem; }
  .tag { font-size: 0.6rem; padding: 1px 4px; }
  .input-bar { padding: 12px; }
  .input-bar input[type="text"] { width: 100%; }
  h1 { font-size: 1.4rem; }
}
</style>
</head>
<body>

<h1>Gals in Jers/London 💘🧚💌</h1>
<p class="subtitle">Write your name & select any days you're potentially free in London or Jers in June & July!! Sorry this is so extra of me, can't wait to see u gals xxx</p>

<div class="input-bar">
  <input type="text" id="nameInput" placeholder="Your name">
  <div class="loc-btns">
    <button class="loc-btn" data-loc="jersey" onclick="pickLocation('jersey')">🐄 Jersey</button>
    <button class="loc-btn" data-loc="london" onclick="pickLocation('london')">🇬🇧 London</button>
  </div>
  <span class="name-hint" id="nameHint" style="font-size:0.82rem; color:#9b9a97;">Enter your name, then pick a location to start</span>
</div>

<div class="select-banner" id="selectBanner">
  <span class="banner-text" id="bannerText"></span>
  <div class="banner-actions">
    <button class="banner-switch-btn" id="switchBtn" onclick="switchLocation()"></button>
    <button class="banner-done-btn" id="bannerDoneBtn" onclick="doneSelecting()">✓ Done</button>
    <button class="banner-cancel-btn" onclick="cancelSelecting()">Cancel</button>
  </div>
</div>

<div id="calendarContainer"></div>

<div class="people-section">
  <h2>People</h2>
  <div id="peopleList"><p class="no-people">No one yet — add your availability above.</p></div>
</div>

<script>
let entries = [];
let selectedDays = new Set();
let currentLocation = null;
let selecting = false;

// ---- API helpers ----
async function fetchEntries() {
  const res = await fetch("/api/entries");
  entries = await res.json();
  render();
}

async function postEntry(entry) {
  await fetch("/api/entries", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(entry)
  });
  await fetchEntries();
}

async function deleteEntry(name) {
  await fetch("/api/entries/" + encodeURIComponent(name), { method: "DELETE" });
  await fetchEntries();
}

// ---- Calendar date helpers ----
function calendarDays() {
  // June 1 2026 is Monday. We show June 1 - July 5 (5 weeks).
  const days = [];
  const start = new Date(2026, 5, 1); // June 1
  const end = new Date(2026, 6, 5);   // July 5
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    days.push(new Date(d));
  }
  return days;
}

function fmtKey(d) {
  return d.toISOString().slice(0, 10);
}

function isWeekend(d) {
  return d.getDay() === 0 || d.getDay() === 6;
}

function isToday(d) {
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

// ---- Build calendar HTML ----
function buildCalendar() {
  const container = document.getElementById("calendarContainer");
  const days = calendarDays();
  const dayNames = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];

  // Build a map: dateKey -> [{name, location, colorIdx}]
  const dayMap = {};
  entries.forEach(e => {
    (e.dates || []).forEach(dk => {
      if (!dayMap[dk]) dayMap[dk] = [];
      dayMap[dk].push({ name: e.name, location: e.location, colorIdx: e.colorIdx ?? 0 });
    });
  });

  let html = "";

  // Split into months for labeling
  let currentMonth = -1;
  const weeks = [];
  let week = [];
  days.forEach(d => {
    // day of week: Mon=0 ... Sun=6
    const dow = (d.getDay() + 6) % 7;
    if (dow === 0 && week.length) { weeks.push(week); week = []; }
    week.push(d);
  });
  if (week.length) {
    // Pad last week to 7 days
    while (week.length < 7) week.push(null);
    weeks.push(week);
  }

  // Header
  html += '<div class="cal-header">';
  dayNames.forEach(n => { html += `<div>${n}</div>`; });
  html += '</div>';

  let lastMonth = -1;
  weeks.forEach(wk => {
    const firstReal = wk.find(d => d !== null);
    if (firstReal && firstReal.getMonth() !== lastMonth) {
      lastMonth = firstReal.getMonth();
      const mName = firstReal.toLocaleString("en", { month: "long", year: "numeric" });
      html += `<div class="month-label">${mName}</div>`;
    }

    html += '<div class="cal-grid">';
    wk.forEach(d => {
      if (!d) {
        html += '<div class="day-cell empty"></div>';
        return;
      }
      const key = fmtKey(d);
      const classes = ["day-cell"];
      if (isWeekend(d)) classes.push("weekend");
      if (isToday(d)) classes.push("today");
      if (selectedDays.has(key)) classes.push("selected-day");

      html += `<div class="${classes.join(" ")}" data-date="${key}" onclick="toggleDay('${key}')">`;
      html += `<div class="day-num">${d.getDate()}</div>`;
      html += '<div class="tags">';
      (dayMap[key] || []).forEach(t => {
        const tagClass = t.location === "jersey" ? "tag-jersey" : "tag-london";
        html += `<span class="tag ${tagClass}">${t.name}</span>`;
      });
      html += '</div></div>';
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

// ---- People list ----
function dateSuffix(day) {
  if (day >= 11 && day <= 13) return day + "th";
  switch (day % 10) {
    case 1: return day + "st";
    case 2: return day + "nd";
    case 3: return day + "rd";
    default: return day + "th";
  }
}

function formatDateRanges(dateStrings) {
  if (!dateStrings.length) return "";
  const sorted = [...dateStrings].sort();
  const dates = sorted.map(s => new Date(s + "T00:00:00"));
  const ranges = [];
  let start = dates[0], end = dates[0];

  for (let i = 1; i < dates.length; i++) {
    const diff = (dates[i] - end) / (1000 * 60 * 60 * 24);
    if (diff === 1) {
      end = dates[i];
    } else {
      ranges.push([start, end]);
      start = dates[i];
      end = dates[i];
    }
  }
  ranges.push([start, end]);

  return ranges.map(([s, e]) => {
    const sMonth = s.toLocaleString("en", { month: "short" });
    const eMonth = e.toLocaleString("en", { month: "short" });
    if (s.getTime() === e.getTime()) {
      return `${sMonth} ${dateSuffix(s.getDate())}`;
    }
    if (sMonth === eMonth) {
      return `${dateSuffix(s.getDate())}-${dateSuffix(e.getDate())} ${sMonth}`;
    }
    return `${sMonth} ${dateSuffix(s.getDate())} - ${eMonth} ${dateSuffix(e.getDate())}`;
  }).join(", ");
}

function buildPeople() {
  const list = document.getElementById("peopleList");
  const grouped = {};
  entries.forEach(e => {
    const key = e.name.toLowerCase();
    if (!grouped[key]) grouped[key] = { name: e.name, jersey: [], london: [] };
    if (e.location === "jersey") grouped[key].jersey.push(...(e.dates || []));
    else grouped[key].london.push(...(e.dates || []));
  });

  const names = Object.keys(grouped);
  if (!names.length) {
    list.innerHTML = '<p class="no-people">No one yet — add your availability above.</p>';
    return;
  }

  let html = "";
  names.forEach(key => {
    const g = grouped[key];
    const jerseyUnique = [...new Set(g.jersey)];
    const londonUnique = [...new Set(g.london)];

    let meta = "";
    if (jerseyUnique.length) {
      meta += `<span class="tag tag-jersey" style="font-size:0.78rem">${jerseyUnique.length} day${jerseyUnique.length !== 1 ? "s" : ""} Jersey</span> `;
      meta += `<span class="person-meta">${formatDateRanges(jerseyUnique)}</span>`;
    }
    if (jerseyUnique.length && londonUnique.length) {
      meta += `<span class="person-meta" style="margin: 0 6px;">·</span>`;
    }
    if (londonUnique.length) {
      meta += `<span class="tag tag-london" style="font-size:0.78rem">${londonUnique.length} day${londonUnique.length !== 1 ? "s" : ""} London</span> `;
      meta += `<span class="person-meta">${formatDateRanges(londonUnique)}</span>`;
    }

    html += `<div class="person-row">
      <div class="person-info" style="flex-wrap:wrap; gap:6px;">
        <span style="font-weight:600; font-size:0.9rem; min-width:60px;">${g.name}</span>
        ${meta}
      </div>
      <button class="edit-btn" onclick="editPerson('${g.name.replace(/'/g, "\\'")}')">Edit</button>
    </div>`;
  });
  list.innerHTML = html;
}

// ---- Render all ----
function render() {
  buildCalendar();
  buildPeople();
}

// ---- Interaction ----
function pickLocation(loc) {
  const name = document.getElementById("nameInput").value.trim();
  if (!name) {
    // Flash the name input to show they need to enter a name first
    const input = document.getElementById("nameInput");
    input.style.borderColor = "#e8907a";
    input.placeholder = "Enter your name first!";
    input.focus();
    setTimeout(() => { input.style.borderColor = ""; input.placeholder = "Your name"; }, 2000);
    return;
  }

  if (selecting) {
    // Already selecting — switch location
    const currentSet = currentLocation === "jersey" ? jerseyDays : londonDays;
    currentSet.clear();
    selectedDays.forEach(d => currentSet.add(d));

    currentLocation = loc;
    document.querySelectorAll(".loc-btn").forEach(b => {
      b.classList.remove("active-jersey", "active-london");
      if (b.dataset.loc === loc) b.classList.add(loc === "jersey" ? "active-jersey" : "active-london");
    });

    selectedDays.clear();
    const newSet = currentLocation === "jersey" ? jerseyDays : londonDays;
    newSet.forEach(d => selectedDays.add(d));

    updateBanner();
    render();
  } else {
    // Start selecting immediately
    currentLocation = loc;
    document.querySelectorAll(".loc-btn").forEach(b => {
      b.classList.remove("active-jersey", "active-london");
      if (b.dataset.loc === loc) b.classList.add(loc === "jersey" ? "active-jersey" : "active-london");
    });
    startSelecting();
  }
}

// Track selections per location
let jerseyDays = new Set();
let londonDays = new Set();
let selectingName = "";
let editingExisting = false; // true when editing an existing person

function updateBanner() {
  const banner = document.getElementById("selectBanner");
  const locLabel = currentLocation === "jersey" ? "Jersey" : "London";
  const otherLabel = currentLocation === "jersey" ? "🇬🇧 London" : "🐄 Jersey";
  const currentDays = currentLocation === "jersey" ? jerseyDays : londonDays;
  const otherDays = currentLocation === "jersey" ? londonDays : jerseyDays;

  banner.className = `select-banner show ${currentLocation === "jersey" ? "jersey-mode" : "london-mode"}`;

  const action = editingExisting ? "editing" : "selecting";
  let text = `<strong>${selectingName}</strong> — ${action} ${locLabel} days`;
  if (currentDays.size > 0) text += ` <span class="day-count">(${currentDays.size} selected)</span>`;
  if (otherDays.size > 0) text += ` · ${currentLocation === "jersey" ? "🇬🇧" : "🐄"} ${otherDays.size}`;
  document.getElementById("bannerText").innerHTML = text;

  document.getElementById("switchBtn").textContent = `Switch to ${otherLabel}`;
  document.getElementById("bannerDoneBtn").textContent = editingExisting ? "Save" : "Done";
}

function startSelecting() {
  selecting = true;
  editingExisting = false;
  selectingName = document.getElementById("nameInput").value.trim();
  selectedDays.clear();
  jerseyDays.clear();
  londonDays.clear();

  document.body.classList.add("selecting");
  document.getElementById("nameInput").disabled = true;
  document.getElementById("nameHint").style.display = "none";

  updateBanner();
  render();
}

function editPerson(name) {
  if (selecting) return; // already in a mode

  selecting = true;
  editingExisting = true;
  selectingName = name;
  jerseyDays.clear();
  londonDays.clear();

  // Load existing dates for this person
  entries.forEach(e => {
    if (e.name.toLowerCase() === name.toLowerCase()) {
      (e.dates || []).forEach(d => {
        if (e.location === "jersey") jerseyDays.add(d);
        else londonDays.add(d);
      });
    }
  });

  // Default to jersey view, or london if they only have london days
  currentLocation = jerseyDays.size > 0 ? "jersey" : (londonDays.size > 0 ? "london" : "jersey");
  document.querySelectorAll(".loc-btn").forEach(b => {
    b.classList.remove("active-jersey", "active-london");
    if (b.dataset.loc === currentLocation) b.classList.add(currentLocation === "jersey" ? "active-jersey" : "active-london");
  });

  // Load current location's days into selectedDays
  selectedDays.clear();
  const currentSet = currentLocation === "jersey" ? jerseyDays : londonDays;
  currentSet.forEach(d => selectedDays.add(d));

  document.body.classList.add("selecting");
  document.getElementById("nameInput").value = name;
  document.getElementById("nameInput").disabled = true;
  document.getElementById("nameHint").style.display = "none";

  updateBanner();
  render();
}

function switchLocation() {
  // Save current days to the right set
  const currentSet = currentLocation === "jersey" ? jerseyDays : londonDays;
  currentSet.clear();
  selectedDays.forEach(d => currentSet.add(d));

  // Switch
  currentLocation = currentLocation === "jersey" ? "london" : "jersey";
  document.querySelectorAll(".loc-btn").forEach(b => {
    b.classList.remove("active-jersey", "active-london");
    if (b.dataset.loc === currentLocation) b.classList.add(currentLocation === "jersey" ? "active-jersey" : "active-london");
  });

  // Load the other location's days
  selectedDays.clear();
  const newSet = currentLocation === "jersey" ? jerseyDays : londonDays;
  newSet.forEach(d => selectedDays.add(d));

  updateBanner();
  render();
}

function cancelSelecting() {
  selecting = false;
  selectedDays.clear();
  jerseyDays.clear();
  londonDays.clear();
  currentLocation = null;
  document.body.classList.remove("selecting");
  document.getElementById("selectBanner").classList.remove("show");
  document.getElementById("nameInput").disabled = false;
  document.getElementById("nameInput").value = "";
  document.getElementById("nameHint").style.display = "";
  document.querySelectorAll(".loc-btn").forEach(b => b.classList.remove("active-jersey", "active-london"));
  render();
}

async function doneSelecting() {
  // Save current location's days
  const currentSet = currentLocation === "jersey" ? jerseyDays : londonDays;
  currentSet.clear();
  selectedDays.forEach(d => currentSet.add(d));

  if (!jerseyDays.size && !londonDays.size && !editingExisting) { cancelSelecting(); return; }

  if (editingExisting) {
    // PUT replaces all entries for this person
    await fetch("/api/entries/" + encodeURIComponent(selectingName), {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        jersey: [...jerseyDays].sort(),
        london: [...londonDays].sort()
      })
    });
  } else {
    // Post new entries
    if (jerseyDays.size > 0) {
      await postEntry({
        name: selectingName,
        location: "jersey",
        dates: [...jerseyDays].sort()
      });
    }
    if (londonDays.size > 0) {
      await postEntry({
        name: selectingName,
        location: "london",
        dates: [...londonDays].sort()
      });
    }
  }

  selecting = false;
  editingExisting = false;
  selectedDays.clear();
  jerseyDays.clear();
  londonDays.clear();
  currentLocation = null;
  document.body.classList.remove("selecting");
  document.getElementById("selectBanner").classList.remove("show");
  document.getElementById("nameInput").disabled = false;
  document.getElementById("nameInput").value = "";
  document.getElementById("nameHint").style.display = "";
  document.querySelectorAll(".loc-btn").forEach(b => b.classList.remove("active-jersey", "active-london"));
  await fetchEntries();
}

function toggleDay(key) {
  if (!selecting) return;
  if (selectedDays.has(key)) selectedDays.delete(key);
  else selectedDays.add(key);
  updateBanner();
  render();
}

// ---- Init ----
fetchEntries();
</script>
</body>
</html>
